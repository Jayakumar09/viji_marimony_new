<!DOCTYPE html>
<html>
<head>
  <title>OTP Test Server</title>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 600px; margin: 0 auto; }
    .card { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 8px; }
    input { padding: 8px; width: 200px; margin-right: 10px; }
    button { padding: 8px 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
    .result { margin-top: 10px; padding: 10px; background: #f5f5f5; border-radius: 4px; white-space: pre-wrap; }
    h2 { color: #333; }
  </style>
</head>
<body>
  <h1>OTP Test Server - Port 5003</h1>
  
  <div class="card">
    <h2>📧 Send Email OTP</h2>
    <input type="email" id="email" placeholder="Enter email" value="test@example.com">
    <button onclick="sendEmailOTP()">Send</button>
    <div id="emailResult" class="result"></div>
  </div>

  <div class="card">
    <h2>✅ Verify Email OTP</h2>
    <input type="email" id="verifyEmail" placeholder="Enter email" value="test@example.com">
    <input type="text" id="emailOtp" placeholder="Enter OTP">
    <button onclick="verifyEmailOTP()">Verify</button>
    <div id="verifyEmailResult" class="result"></div>
  </div>

  <div class="card">
    <h2>📱 Send Phone OTP</h2>
    <input type="text" id="phone" placeholder="+919999999999" value="+918940735144">
    <button onclick="sendPhoneOTP()">Send</button>
    <div id="phoneResult" class="result"></div>
  </div>

  <div class="card">
    <h2>✅ Verify Phone OTP</h2>
    <input type="text" id="verifyPhone" placeholder="+919999999999" value="+918940735144">
    <input type="text" id="phoneOtp" placeholder="Enter OTP">
    <button onclick="verifyPhoneOTP()">Verify</button>
    <div id="verifyPhoneResult" class="result"></div>
  </div>

  <script>
    const BASE_URL = 'http://localhost:5004/api';

    async function sendEmailOTP() {
      const email = document.getElementById('email').value;
      try {
        const res = await fetch(`${BASE_URL}/send-email-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        document.getElementById('emailResult').textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById('emailResult').textContent = 'Error: ' + e.message;
      }
    }

    async function verifyEmailOTP() {
      const email = document.getElementById('verifyEmail').value;
      const otp = document.getElementById('emailOtp').value;
      try {
        const res = await fetch(`${BASE_URL}/verify-email-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, otp })
        });
        const data = await res.json();
        document.getElementById('verifyEmailResult').textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById('verifyEmailResult').textContent = 'Error: ' + e.message;
      }
    }

    async function sendPhoneOTP() {
      const phone = document.getElementById('phone').value;
      try {
        const res = await fetch(`${BASE_URL}/send-phone-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone })
        });
        const data = await res.json();
        document.getElementById('phoneResult').textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById('phoneResult').textContent = 'Error: ' + e.message;
      }
    }

    async function verifyPhoneOTP() {
      const phone = document.getElementById('verifyPhone').value;
      const otp = document.getElementById('phoneOtp').value;
      try {
        const res = await fetch(`${BASE_URL}/verify-phone-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, otp })
        });
        const data = await res.json();
        document.getElementById('verifyPhoneResult').textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById('verifyPhoneResult').textContent = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
